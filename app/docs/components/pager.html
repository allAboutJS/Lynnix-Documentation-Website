<div class="flex gap-6 max-w-4xl text-sm">
  <div class="flex-1">
    {{ if data.pager.prev }}
    <a href="{{ data.pager.prev.path }}" class="flex justify-start items-center bg-zinc-900 hover:bg-zinc-950/80 hover:text-purple-400 transition p-6 rounded-lg border border-zinc-700">
      <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M576-240 336-480l240-240 51 51-189 189 189 189-51 51Z"/></svg>
      <p>{{ data.pager.prev.title }}</p>
    </a>
    {{ endif }}
  </div>

  <div class="flex-1">
    {{ if data.pager.next }}
    <a href="{{ data.pager.next.path }}" class="flex justify-end items-center bg-zinc-900 hover:bg-zinc-950/80 hover:text-purple-400 transition p-6 rounded-lg border border-zinc-700">
      <p>{{ data.pager.next.title }}</p>
      <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M522-480 333-669l51-51 240 240-240 240-51-51 189-189Z"/></svg>
    </a>
    {{ endif }}
  </div>
</div>
