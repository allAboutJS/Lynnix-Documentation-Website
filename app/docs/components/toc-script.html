<!-- Table of Contents -->
<aside id="toc" class="hidden md:block fixed top-16 right-0 w-60 bg-[#111217]/90 border-l border-zinc-800/80 text-zinc-200 text-sm p-6 bottom-0 overflow-auto"></aside>

<script>
(() => {
    const article = document.querySelector(".article");
    const container = document.getElementById("toc");

    if (!article || !container) return;

    const slugCount = new Map();

    const slugify = (text) => {
        let slug = text
            .toLowerCase()
            .trim()
            .replace(/[^\w\s-]/g, "")
            .replace(/\s+/g, "-");

        const count = slugCount.get(slug) ?? 0;

        slugCount.set(slug, count + 1);

        if (count > 0) slug += `-${count}`;

        return slug;
    };

    const headings = [...article.querySelectorAll("h1,h2,h3")];

    headings.forEach((heading) => {
        if (!heading.id) {
            heading.id = slugify(heading.textContent);
        }
    });

    container.innerHTML = `
        <div>
            <p class="mb-4 text-xs font-semibold uppercase tracking-widest text-zinc-500">
                On this page
            </p>

            <nav class="space-y-1"></nav>
        </div>
    `;

    const nav = container.querySelector("nav");

    headings.forEach((heading) => {
        const level = Number(heading.tagName.substring(1));

        const link = document.createElement("a");

        link.href = `#${heading.id}`;
        link.dataset.target = heading.id;

        link.className = `
            block rounded-md py-1.5 text-sm transition-colors
            text-zinc-400 hover:text-white
            ${level === 1 ? "font-medium" : ""}
            ${level === 2 ? "pl-4" : ""}
            ${level === 3 ? "pl-8 text-[13px]" : ""}
        `;

        link.textContent = heading.textContent;

        nav.appendChild(link);
    });

    const links = [...nav.querySelectorAll("a")];

    const observer = new IntersectionObserver(
        (entries) => {
            entries.forEach((entry) => {
                const link = nav.querySelector(
                    `[data-target="${entry.target.id}"]`
                );

                if (!link) return;

                if (entry.isIntersecting) {
                    links.forEach((a) => {
                        a.classList.remove(
                            "text-violet-400",
                            "font-semibold"
                        );
                        a.classList.add("text-zinc-400");
                    });

                    link.classList.remove("text-zinc-400");
                    link.classList.add(
                        "text-violet-400",
                        "font-semibold"
                    );
                }
            });
        },
        {
            rootMargin: "-20% 0px -65% 0px"
        }
    );

    headings.forEach((heading) => void observer.observe(heading));
})();
</script>
